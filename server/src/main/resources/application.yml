server:
  port: 8080
  servlet:
    context-path: /
  tomcat:
    connection-timeout: 5s

spring:
  application:
    name: ecommerce-server
  
  datasource:
    url: jdbc:h2:mem:ecommerce;MODE=MySQL;DATABASE_TO_LOWER=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
    hikari:
      connection-timeout: 30000
      maximum-pool-size: 4
      minimum-idle: 1

  h2:
    console:
      enabled: true
      path: /h2-console
  
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}

  sql:
    init:
      mode: always

logging:
  level:
    com.ecommerce: DEBUG
    org.springframework.security: INFO
    org.springframework.web: INFO
    org.mybatis: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %highlight(%-5level) - %cyan(%logger{36}) - %msg%n"
    file: "%d{yyyy-MM-dd HH:mm:ss} - %-5level - %logger{36} - %msg%n"
  file:
    name: logs/ecommerce.log
    max-size: 10MB
    max-history: 30

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
      probes:
        enabled: true

app:
  jwt:
    secret: ${JWT_SECRET:your-jwt-secret-key-at-least-32-characters-long}
    expiration-hours: 24

mybatis:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha
  show-actuator: true
  default-produces-media-type: application/json
  default-consumes-media-type: application/json
