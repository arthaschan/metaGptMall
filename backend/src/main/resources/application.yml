spring:
  datasource:
    url: jdbc:mysql://localhost:3306/ecommerce?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
    username: test
    # MUST change before production
    password: "123456"
    driver-class-name: com.mysql.cj.jdbc.Driver

  data:
    redis:
      host: localhost
      port: 6379

mybatis:
  mapper-locations: classpath:mapper/*.xml
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

rocketmq:
  name-server: localhost:9876
  producer:
    group: ecommerce-backend-producer
    send-message-timeout: 3000

app:
  jwt:
    # MUST change to a strong random secret before production (min 32 chars)
    secret: "CHANGE_ME_IN_PRODUCTION_USE_STRONG_SECRET_KEY_HERE"
    expiration-ms: 86400000   # 24 hours
  redis:
    product-ttl-seconds: 60   # ecom:product:{id} TTL

springdoc:
  api-docs:
    path: /api-docs
  swagger-ui:
    path: /swagger-ui.html

server:
  port: 8080
